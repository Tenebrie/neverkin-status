status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  cname: status.neverkin.com
  # baseUrl: /neverkin-status
  logoUrl: https://raw.githubusercontent.com/Tenebrie/neverkin-status/HEAD/assets/neverkin-logo-dragon.webp
  favicon: https://raw.githubusercontent.com/Tenebrie/neverkin-status/HEAD/assets/favicon.ico
  name: Neverkin Status
  introTitle: "**Neverkin** Status"
  introMessage: This is the status page for [Neverkin](https://neverkin.com), the collaborative worldbuilding platform for writers, game masters, and creators.
  theme: dark
  css: |
    /* Neverkin brand colors */
    :root {
      --color-primary: rgb(167 139 250);
      --color-secondary: rgb(129 140 248);
      --color-accent: rgb(244 114 182);
      --color-bg: rgb(7 7 20);
      --color-bg-card: rgba(15 15 35 / 0.9);
      --color-text: rgb(226 232 240);
      --color-text-heading: rgb(248 250 252);
      --brand-gradient: linear-gradient(135deg, #f2edb6 0%, #f8c569 33%, #ce7259 66%, #9c3e4e 100%);
    }

    body {
      background-color: var(--color-bg) !important;
      color: var(--color-text) !important;
    }

    /* Navigation bar */
    nav, .navbar, header {
      background-color: rgba(7 7 20 / 0.95) !important;
      border-bottom: 1px solid rgba(167 139 250 / 0.15) !important;
    }
    nav a, .navbar a {
      font-weight: bold !important;
    }

    /* Links */
    a {
      color: var(--color-primary) !important;
    }
    a:hover {
      color: var(--color-secondary) !important;
    }

    /* Headings */
    h1, h2, h3, h4, h5, h6 {
      color: var(--color-text-heading) !important;
    }

    /* Intro title - brand gradient */
    h1 strong, .intro-title strong {
      background-image: var(--brand-gradient) !important;
      -webkit-background-clip: text !important;
      background-clip: text !important;
      color: transparent !important;
    }

    /* Cards / service rows */
    .card, .rounded, [class*="shadow"] {
      background-color: var(--color-bg-card) !important;
      border-color: rgba(167 139 250 / 0.12) !important;
    }

    /* Buttons */
    .btn-primary, button[class*="primary"] {
      background-color: rgb(139 92 246) !important;
      border-color: rgb(139 92 246) !important;
    }
    .btn-primary:hover, button[class*="primary"]:hover {
      background-color: var(--color-secondary) !important;
      border-color: var(--color-secondary) !important;
    }

    /* Status indicators - keep green/red but tint to match */
    .status-up, .badge-success {
      background-color: rgb(34 197 94) !important;
    }
    .status-down, .badge-danger {
      background-color: rgb(239 68 68) !important;
    }
    .status-degraded, .badge-warning {
      background-color: rgb(245 158 11) !important;
    }

    /* Footer */
    footer {
      background-color: transparent !important;
      border-top: 1px solid rgba(167 139 250 / 0.1) !important;
      color: var(--color-text) !important;
    }
  navbar:
    - title: Status
      href: /
    - title: Neverkin
      href: https://neverkin.com
    - title: GitHub
      href: https://github.com/tenebrie/timelines
